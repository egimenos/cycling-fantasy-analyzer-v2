name: E2E Tests

on:
  workflow_call:

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cycling
          POSTGRES_PASSWORD: cycling
          POSTGRES_DB: cycling_analyzer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cycling -d cycling_analyzer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cycling:cycling@localhost:5432/cycling_analyzer
      PORT: 3001
      NODE_ENV: test
      ML_SERVICE_URL: http://localhost:8000
      LOG_LEVEL: error
      SKIP_EXTERNAL: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # Apply database migrations and seed test data
      - run: cd apps/api && npx drizzle-kit migrate
      - run: psql $DATABASE_URL -f apps/web/tests/e2e/fixtures/seed-ci.sql

      # Start ML mock server (lightweight Node script on port 8000)
      - run: node apps/web/tests/e2e/fixtures/ml-mock-server.mjs > /tmp/ml-mock.log 2>&1 &

      # Start API server in background (skip OTel instrumentation to avoid
      # require-in-the-middle breaking pnpm's strict module resolution)
      - run: cd apps/api && node dist/main > /tmp/api.log 2>&1 &

      # Wait for API to be ready
      - run: npx wait-on http://localhost:3001/health/liveness --timeout 60000 || (cat /tmp/api.log && exit 1)

      # Install Playwright browsers
      - run: cd apps/web && pnpm exec playwright install --with-deps chromium

      # Run E2E tests
      - run: cd apps/web && pnpm test:e2e

      # Upload test artifacts on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7
