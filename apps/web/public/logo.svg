<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="rim" x1="8" y1="8" x2="32" y2="32">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bolt" x1="18" y1="12" x2="26" y2="28">
      <stop offset="0%" stop-color="#eac34a"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="speed" x1="0" y1="20" x2="12" y2="20">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="22" cy="20" r="15" fill="#3b82f6" opacity="0.06"/>

  <!-- Wheel rim -->
  <circle cx="22" cy="20" r="14" stroke="url(#rim)" stroke-width="2.2" fill="none"/>

  <!-- Inner rim detail -->
  <circle cx="22" cy="20" r="10.5" stroke="#3b82f6" stroke-width="0.5" opacity="0.2" fill="none"/>

  <!-- Spokes — 6 evenly spaced -->
  <line x1="22" y1="6" x2="22" y2="12" stroke="#3b82f6" stroke-width="0.6" opacity="0.35"/>
  <line x1="22" y1="28" x2="22" y2="34" stroke="#3b82f6" stroke-width="0.6" opacity="0.35"/>
  <line x1="8.14" y1="12" x2="13.14" y2="16" stroke="#3b82f6" stroke-width="0.6" opacity="0.35"/>
  <line x1="35.86" y1="12" x2="30.86" y2="16" stroke="#3b82f6" stroke-width="0.6" opacity="0.35"/>
  <line x1="8.14" y1="28" x2="13.14" y2="24" stroke="#3b82f6" stroke-width="0.6" opacity="0.35"/>
  <line x1="35.86" y1="28" x2="30.86" y2="24" stroke="#3b82f6" stroke-width="0.6" opacity="0.35"/>

  <!-- Hub -->
  <circle cx="22" cy="20" r="2.5" fill="url(#rim)"/>
  <circle cx="22" cy="20" r="1" fill="#0b1326"/>

  <!-- Lightning bolt / optimization symbol — centered in wheel -->
  <path d="M24.5 13 L20 20.5 L23.5 20.5 L19.5 27 L25.5 19 L22 19 Z"
        fill="url(#bolt)" opacity="0.9"/>

  <!-- Speed lines — left side -->
  <line x1="1" y1="15" x2="6" y2="15" stroke="url(#speed)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="0" y1="20" x2="7" y2="20" stroke="url(#speed)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="1" y1="25" x2="6" y2="25" stroke="url(#speed)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
