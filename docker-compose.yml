services:
  postgres:
    image: postgres:16-alpine
    container_name: cycling-postgres
    environment:
      POSTGRES_USER: cycling
      POSTGRES_PASSWORD: cycling
      POSTGRES_DB: cycling_analyzer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cycling -d cycling_analyzer']
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    container_name: cycling-ml-service
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://cycling:cycling@postgres:5432/cycling_analyzer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ml/models:/app/models
      - ./ml/src:/app/src
      - ./ml/cache:/app/cache
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
